services:
  hcm-mock:
    build:
      context: ./mock
      dockerfile: Dockerfile
    ports:
      - '4010:4010'
    environment:
      PORT: '4010'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4010/health']
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  time-off-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: local
      PORT: '3000'
      DATABASE_URL: 'file:/app/data/dev.db'
      HCM_API_BASE_URL: 'http://hcm-mock:4010'
      HCM_TIMEOUT_MS: '3000'
    volumes:
      - ./data:/app/data
    depends_on:
      hcm-mock:
        condition: service_healthy
